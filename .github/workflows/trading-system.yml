name: ChainLens Trading System

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        default: 'monitor'
        type: choice
        options:
          - monitor
          - backtest
          - report

jobs:
  trading-system:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Supabase REST (single data plane)
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Optional: direct DB URL for admin scripts (not used by main path)
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Signal source tokens
      OPENNEWS_TOKEN: ${{ secrets.OPENNEWS_TOKEN }}
      TWITTER_TOKEN: ${{ secrets.TWITTER_TOKEN }}
      TRADING_MODE: paper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv requests

          # Install onchainos CLI (OKX)
          curl -sSL https://raw.githubusercontent.com/okx/onchainos-skills/main/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Supabase REST connectivity
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          sys.path.insert(0, '.')
          from supabase_client import select, is_available
          if not is_available():
              print("::error::Supabase REST not configured. Set SUPABASE_URL and SUPABASE_SERVICE_KEY.")
              sys.exit(1)
          rows = select("trading_config", columns="config_key", limit=1)
          print(f"Supabase REST: OK ({len(rows)} config rows)")
          PYEOF

      # ── Signal Collection (non-critical sources may fail with warning) ───────
      - name: Collect Smart Money signals
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 signal_monitor.py

      - name: Collect news signals (OpenNews + RSS fallback)
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 news_monitor.py || echo "::warning::News monitor failed"

      - name: Collect Twitter KOL signals (OpenTwitter)
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 twitter_kol_monitor.py || echo "::warning::Twitter KOL monitor failed"

      - name: Collect on-chain metrics
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 onchain_monitor.py || echo "::warning::On-chain monitor failed"

      - name: Calculate technical indicators
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 technical_indicators.py || echo "::warning::Technical indicators failed"

      - name: Calculate multi-signal scores
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 multi_signal_scorer.py || echo "::warning::Multi-signal scorer failed"

      # ── Strategy & Risk (critical - fail the job on error) ───────────────────
      - name: Check risk limits
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 intelligent_risk_manager.py

      - name: Run strategy engine
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 strategy_engine.py

      - name: Monitor positions
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 position_monitor.py

      - name: Manage live trading approvals
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 live_trading_manager.py || echo "::warning::Live trading manager failed"

      # ── Dashboard ─────────────────────────────────────────────────────────────
      - name: Generate dashboard data
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: |
          python3 dashboard_generator.py || echo "::warning::Dashboard generation failed"
          mkdir -p docs
          [ -f index.html ] && mv index.html docs/

      # ── Backtest / Report ──────────────────────────────────────────────────────
      - name: Run backtester
        if: github.event.inputs.task == 'backtest' || github.event.inputs.task == 'report'
        run: python3 auto_backtester.py || echo "::warning::Backtester failed"

      - name: Generate daily report
        if: github.event.inputs.task == 'report'
        run: python3 daily_report.py || echo "::warning::Daily report failed"
