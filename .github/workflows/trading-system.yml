name: ChainLens Trading System

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        default: 'monitor'
        type: choice
        options:
          - monitor
          - backtest
          - report

jobs:
  trading-system:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chainlens
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # Supabase REST API (preferred — works everywhere, no IPv6 issues)
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Direct DB fallback (local postgres service)
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chainlens
      # Signal source tokens
      OPENNEWS_TOKEN: ${{ secrets.OPENNEWS_TOKEN }}
      TWITTER_TOKEN: ${{ secrets.TWITTER_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary python-dotenv web3 requests

          # Install onchainos CLI (for Smart Money signals)
          curl -sSL https://raw.githubusercontent.com/okx/onchainos-skills/main/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Initialize database
        run: |
          echo "=== Database Setup ==="
          python3 -c "from db_adapter import print_status; print_status()"

          # Always init local postgres (for fallback)
          psql "postgresql://postgres:postgres@localhost:5432/chainlens" -f schema.sql 2>/dev/null || true

          # Verify Supabase REST connectivity
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_SERVICE_KEY" ]; then
            python3 -c "
          from supabase_client import select
          rows = select('trading_config', limit=1)
          print(f'Supabase REST: OK ({len(rows)} config rows)')
          " && echo "Using Supabase REST API" || echo "::warning::Supabase REST failed, using local postgres"
          else
            echo "No Supabase credentials, using local postgres"
          fi

      # ── Signal Collection ──────────────────────────────────────
      - name: Collect Smart Money signals
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 signal_monitor.py

      - name: Collect news signals (OpenNews + RSS fallback)
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 news_monitor.py

      - name: Collect Twitter KOL signals (OpenTwitter)
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 twitter_kol_monitor.py || echo "::warning::Twitter KOL monitor failed"

      - name: Collect on-chain metrics
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 onchain_monitor.py || echo "::warning::On-chain monitor failed"

      - name: Calculate technical indicators
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 technical_indicators.py || echo "::warning::Technical indicators failed"

      - name: Calculate multi-signal scores
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 multi_signal_scorer.py || echo "::warning::Multi-signal scorer failed"

      # ── Health Check ───────────────────────────────────────────
      - name: Signal health report
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: |
          python3 << 'PYEOF'
          import os, sys
          sys.path.insert(0, '.')

          try:
              from supabase_client import select, is_available
              if is_available():
                  signals = select("signals", columns="source,signal_score",
                                   filters={"timestamp": "gte.now()-interval '30 minutes'"})
                  if not signals:
                      # Try broader window
                      signals = select("signals", columns="source,signal_score", limit=100,
                                       order="timestamp.desc")

                  from collections import Counter
                  by_source = Counter(s["source"] for s in signals)
                  nonzero = Counter(s["source"] for s in signals if (s.get("signal_score") or 0) > 0)

                  for src in sorted(by_source):
                      print(f"📊 {src}: {by_source[src]} signals ({nonzero.get(src, 0)} with score>0)")

                  print(f"\nTotal signals: {len(signals)}")
                  if len(signals) == 0:
                      print("::warning::No signals collected!")
                  sys.exit(0)
          except Exception as e:
              print(f"REST health check failed: {e}", file=sys.stderr)

          # Fallback to psql
          import subprocess
          db = os.getenv("DATABASE_URL", "")
          if db:
              subprocess.run(["psql", db, "-t", "-A", "-c",
                  "SELECT source, COUNT(*) FROM signals WHERE timestamp >= NOW() - INTERVAL '30 minutes' GROUP BY source"],
                  check=False)
          PYEOF

      # ── Strategy & Risk ────────────────────────────────────────
      - name: Check risk limits
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 intelligent_risk_manager.py || echo "::warning::Risk manager failed"

      - name: Run strategy engine
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 strategy_engine.py

      - name: Monitor positions
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: python3 position_monitor.py

      # ── Dashboard ──────────────────────────────────────────────
      - name: Generate dashboard data
        if: github.event.inputs.task == 'monitor' || github.event_name == 'schedule'
        run: |
          python3 dashboard_generator.py || echo "::warning::Dashboard generation failed"
          mkdir -p docs
          [ -f index.html ] && mv index.html docs/

      # ── Backtest / Report ──────────────────────────────────────
      - name: Run backtester
        if: github.event.inputs.task == 'backtest' || github.event.inputs.task == 'report'
        run: python3 auto_backtester.py || echo "::warning::Backtester failed"

      - name: Generate daily report
        if: github.event.inputs.task == 'report'
        run: python3 daily_report.py
